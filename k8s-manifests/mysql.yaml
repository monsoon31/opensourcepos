apiVersion: apps/v1
kind: Deployment
metadata:
  name: ospos-db
  namespace: default
spec:
  selector:
    matchLabels:
      app: ospos-db
  template:
    metadata:
      labels:
        app: ospos-db
    spec:
      containers:
      - name: mariadb
        image: mariadb:10.5
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ospos-secret
              key: mysql-root-password
        - name: MYSQL_USER
          value: "ospos_user"
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ospos-secret
              key: mysql-password
        - name: MYSQL_DATABASE
          value: "ospos_db"
        ports:
        - containerPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: default
spec:
  selector:
    app: ospos-db
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306

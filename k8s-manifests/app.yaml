apiVersion: apps/v1
kind: Deployment
metadata:
  name: ospos-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ospos-app
  template:
    metadata:
      labels:
        app: ospos-app
    spec:
      containers:
      - name: ospos
        image: dotujr/opensourcepos:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        # Mengambil semua env umum dari ConfigMap
        envFrom:
        - configMapRef:
            name: ospos-config
        # Mengambil password dari Secret
        env:
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ospos-secret
              key: mysql-password
---
apiVersion: v1
kind: Service
metadata:
  name: ospos-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: ospos-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080

name: CI-Final-Fix

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Ambil source code dari repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Login ke Docker Hub menggunakan Token
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Set up Docker Buildx (Penting untuk build multi-stage)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build dan Push Langsung ke Target Repo
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile 
          push: true
          target: ospos
          # Kita langsung tembak dotujr agar tidak ada salah interpretasi variabel
          tags: dotujr/opensourcepos:latest
          # Menggunakan GitHub Cache agar build berikutnya tidak memakan waktu lama di apt-get
          cache-from: type=gha
          cache-to: type=gha,mode=max

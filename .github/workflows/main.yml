name: Build and Push OSPOS Image

on:
  push:
    branches: [ "master", "main" ] # Sesuaikan dengan nama branch utama kamu

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile # Pastikan path ke Dockerfile benar
          target: ospos           # <--- PENTING: Supaya yang di-build hanya stage produksi, bukan dev
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/opensourcepos:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/opensourcepos:${{ github.sha }}
